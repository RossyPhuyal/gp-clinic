<div class="app-header">
    <h1>GP Clinic Charges Dashboard</h1>
</div>

<div class="container">
    <div class="toolbar">
        <input
                type="text"
                placeholder="Search medical centre..."
                [(ngModel)]="filterName"
                (input)="onFilterChange()"
        />
        <select [(ngModel)]="filterChargeType" (change)="onFilterChange()">
            <option value="">All Charge Types</option>
            <option *ngFor="let t of chargeTypes" [value]="t">{{ t }}</option>
        </select>
        <button class="btn btn-secondary" (click)="resetFilters()">Reset</button>
        <button class="btn btn-primary" (click)="openAddModal()">+ Add New Charge</button>
        <button class="btn btn-secondary" (click)="refreshGrid()">↺ Refresh</button>
    </div>

    <div class="grid-wrapper">
        <ag-grid-angular
                class="ag-theme-alpine"
                style="width: 100%; height: 560px;"
                [columnDefs]="columnDefs"
                [defaultColDef]="defaultColDef"
                rowModelType="infinite"
                [cacheBlockSize]="100"
                [maxBlocksInCache]="5"
                [infiniteInitialRowCount]="500"
                [animateRows]="true"
                (gridReady)="onGridReady($event)"
        ></ag-grid-angular>
        <div class="status-bar">
            <span>Total records: {{ totalRows }}</span>
            <span *ngIf="filterName || filterChargeType">Filters active</span>
        </div>
    </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
        <h2>Add New Charge</h2>
        <div class="form-group">
            <label>Medical Centre Name</label>
            <input type="text" [(ngModel)]="newRow.medical_centre_name" placeholder="Enter your center name" />
        </div>
        <div class="form-group">
            <label>Patient Visit Type</label>
            <select [(ngModel)]="newRow.patient_visit_type">
                <option value="">Select visit type</option>
                <option *ngFor="let v of visitTypes" [value]="v">{{ v }}</option>
            </select>
        </div>
        <div class="form-group">
            <label>Charge Type</label>
            <select [(ngModel)]="newRow.charge_type">
                <option value="">Select charge type</option>
                <option *ngFor="let t of chargeTypes" [value]="t">{{ t }}</option>
            </select>
        </div>
        <div class="form-group">
            <label>Amount (Rs)</label>
            <input type="number" [(ngModel)]="newRow.amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
            <button class="btn btn-primary" (click)="submitNewRow()">Save</button>
        </div>
    </div>
</div>
