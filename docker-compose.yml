services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: gpclinic
      MYSQL_USER: gpclinic_user
      MYSQL_PASSWORD: gpclinic_pass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3310:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gpclinic_user", "-pgpclinic_pass" ]
      interval: 5s
      timeout: 5s
      retries: 10

  seeder:
    build:
      context: ./database
    environment:
      DB_HOST: db
      DB_NAME: gpclinic
      DB_USER: gpclinic_user
      DB_PASSWORD: gpclinic_pass
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: db
      DB_NAME: gpclinic
      DB_USER: gpclinic_user
      DB_PASSWORD: gpclinic_pass
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile_dev
    ports:
      - "4800:4800"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  mysql_data:
